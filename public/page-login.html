<!DOCTYPE html>
<html lang="pt-br">
<head id="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./globals.css">
    <link rel="stylesheet" href="./style.css">
    <script src="./globals.js" type="text/javascript" defer></script>
    <script src="./app.js" type="text/javascript" defer></script>
    <title>Retro Blogger - Login</title>
</head>
<body id="body">
    <header class="header header-centered">
        <h1>Retro Blogger</h1>
        <nav class="nav">
            <ul>
                <li><a href="page-home.html">Home</a></li>
                <li><a href="page-signin.html">Registre-se</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <main class="main">
            <article class="feature-card">
                <h2>Faça Login</h2>
                <form id="login-form" class="form-group">
                    <div class="form-group">
                        <label for="username-login">Usuário:</label>
                        <input type="text" id="username-login" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password-login">Senha:</label>
                        <input type="password" id="password-login" name="password" required>
                    </div>
                    <button type="submit" class="btn">Entrar</button>
                </form>
            </article>
        </main>
    </div>
</body>
</html>
