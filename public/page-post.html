<!DOCTYPE html>
<html lang="pt-br">
<head id="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./globals.css">
    <link rel="stylesheet" href="./style.css">
    <script src="./globals.js" type="text/javascript" defer></script>
    <script src="./app.js" type="text/javascript" defer></script>
    <title>Retro Blogger - Nova Postagem</title>
</head>
<body id="body">
    <header class="header">
        <h1>Retro Blogger</h1>
        <nav class="nav-bar">
            <a href="page-post.html">Início</a>
            <a href="page-user.html">Profile</a>
            <a href="page-settings.html">Settings</a>
            <button onclick="logout()">Logout</button>
        </nav>
    </header>
    <div class="container">
        <main class="main">
            <article class="feature-card">
                <h2>Nova Postagem</h2>
                <form id="post-form">
                    <div class="form-group">
                        <label for="title">Título:</label>
                        <input type="text" id="title" name="title" placeholder="Ex: Como organizar sua rotina digital" required>
                    </div>
                    <div class="form-group">
                        <label for="theme">Tema:</label>
                        <input type="text" id="theme" name="theme" placeholder="Ex: Tecnologia, Estilo de Vida, Dicas" required>
                    </div>
                    <div class="form-group">
                        <label for="content">Conteúdo:</label>
                        <textarea id="content" name="content" placeholder="Conte a sua história, compartilhe dicas ou escreva uma opinião..." required></textarea>
                    </div>
                    <button type="submit" class="btn">Publicar</button>
                </form>
            </article>
            <article class="feature-card">
                <h3>Seu Feed</h3>
                <p>Aqui você verá as postagens mais recentes de seus blogs favoritos.</p>
                <div class="feed-show">
                    
                </div>
            </article>
        </main>
    </div>
</body>
</html>
