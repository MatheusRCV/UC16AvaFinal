<!DOCTYPE html>
<html lang="pt-br">
<head id="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./globals.css">
    <link rel="stylesheet" href="./style.css">
    <script src="./globals.js" type="text/javascript" defer></script>
    <title>Retro Blogger - Nova Postagem</title>
</head>
<body id="body">
    <header class="header">
        <h1>Retro Blogger</h1>
        <nav class="nav">
            <ul>
                <li><a href="page-home.html">Home</a></li>
                <li><a href="page-signin.html">Registre-se</a></li>
                <li><a href="page-login.html">Faça Login</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <main class="main">
            <h2>Nova Postagem</h2>
            <form id="post-form">
                <div class="form-group">
                    <label for="title">Título:</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="content">Conteúdo:</label>
                    <textarea id="content" name="content" required></textarea>
                </div>
                <button type="submit" class="btn">Publicar</button>
            </form>
            <div id="post-preview" class="post">
                <h3>Pré-visualização da Postagem</h3>
                <h4 id="preview-title" class="post-title"></h4>
                <p id="preview-content" class="post-content"></p>
            </div>
            <div id="Seu feed">
                <h3>Seu Feed</h3>
                <p>Aqui você verá as postagens mais recentes de seus blogs favoritos.</p>
            </div>
        </main>
    </div>
</body>
</html>
