<!DOCTYPE html>
<html lang="pt-br">
<head id="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./globals.css">
    <link rel="stylesheet" href="./style.css">
    <script src="./globals.js" type="text/javascript" defer></script>
    <script src="./app.js" type="text/javascript" defer></script>
    <title>Retro Blogger - Configurações</title>
</head>
<body id="body">
    <header class="header">
        <h1>Retro Blogger</h1>
        <nav class="nav-bar">
            <a href="page-post.html">Início</a>
            <a href="page-user.html">Profile</a>
            <a href="page-settings.html">Settings</a>
            <button onclick="logout()">Logout</button>
        </nav>
    </header>
    <div class="container">
        <main class="main">
            <article class="feature-card">
                <h2>Configurações da Conta</h2>
                <form id="settings-form">
                    <div class="form-group">
                        <label for="username">Usuário:</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="name">Nome Completo:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Nova Senha:</label>
                        <input type="password" id="password" name="password">
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirmar Nova Senha:</label>
                        <input type="password" id="confirm-password" name="confirm-password">
                    </div>
                    <button type="submit" class="btn">Salvar Alterações</button>
                </form>
            </article>
        </main>
    </div>
</body>
</html>
