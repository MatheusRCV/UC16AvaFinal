<!DOCTYPE html>
<html lang="pt-br">
<head id="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./globals.css">
    <link rel="stylesheet" href="./style.css">
    <script src="./globals.js" type="text/javascript" defer></script>
    <script src="./app.js" type="text/javascript" defer></script>
    <title>Retro Blogger - Perfil do Usuário</title>
</head>
<body id="body">
    <header class="header">
        <h1>Retro Blogger</h1>
        <nav class="nav-bar">
            <a href="page-post.html">Início</a>
            <a href="page-user.html">Profile</a>
            <a href="page-settings.html">Settings</a>
            <button onclick="logout()">Logout</button>
        </nav>
    </header>
    <div class="container">
        <main class="main">
            <article class="feature-card user-profile-card">
                <img src="./imgs/profile_circle_icon.webp" alt="Avatar" class="user-avatar">
                <h2 id="profile-name">Perfil</h2>
            </article>
            <article class="feature-card">
                <h3>Informações do Usuário</h3>
                <div id="user-info"></div>
            </article>
            <article class="feature-card">
                <h3>Minhas Postagens</h3>
                <ul class="posts-list" id="posts-list"></ul>
                <p id="no-posts-message" style="display:none;">Nenhuma postagem encontrada.</p>
            </article>
            <article class="feature-card user-actions-card">
                <h3>Ações do Usuário</h3>
                <button onclick="window.location.href='page-settings.html'" class="btn">Configurações da Conta</button>
                <button onclick="window.location.href='page-post.html'" class="btn">Nova Postagem</button>
            </article>
        </main>
    </div>
</body>
</html>
